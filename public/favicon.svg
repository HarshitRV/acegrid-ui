<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="a-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect width="512" height="512" rx="112" fill="url(#grid)" />
  
  <g filter="url(#glow)">
    <path d="M 176 368 L 256 144 L 336 368" fill="none" stroke="url(#a-grad)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="205" y1="288" x2="307" y2="288" stroke="url(#a-grad)" stroke-width="56" stroke-linecap="round" />
  </g>
</svg>
